<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: system-ui, sans-serif; width: 320px; padding: 12px; margin: 0; }
    h3 { margin: 0 0 10px; font-size: 15px; }
    label { display: block; font-size: 11px; color: #666; margin-top: 8px; }
    input { width: 100%; box-sizing: border-box; padding: 6px; margin-top: 2px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 7px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; margin-top: 10px; }
    .primary { background: #1677ff; color: #fff; }
    .danger { background: #e74c3c; color: #fff; }
    .ghost { background: #eee; }
    .row { display: flex; gap: 8px; }
    .row button { flex: 1; }
    #status { margin-top: 12px; font-size: 12px; }
    .bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-top: 6px; }
    .bar > div { height: 100%; background: #27ae60; width: 0%; transition: width .3s; }
    .err { color: #e74c3c; font-size: 11px; margin-top: 6px; word-break: break-word; }
    .ok { color: #27ae60; }
    fieldset { border: 1px solid #eee; border-radius: 6px; margin-top: 10px; padding: 8px; }
    legend { font-size: 11px; color: #888; }
  </style>
</head>
<body>
  <h3>📊 POSMANAGER Scraper</h3>

  <fieldset id="loginBox">
    <legend>Connessione server</legend>
    <label>Server URL</label>
    <input id="server" value="https://vps-008f120b.vps.ovh.net">
    <label>Utente</label>
    <input id="user" value="admin">
    <label>Password</label>
    <input id="pass" type="password" placeholder="password admin">
    <button id="loginBtn" class="primary">Connetti</button>
    <div id="loginMsg" style="font-size:11px;margin-top:6px;"></div>
  </fieldset>

  <fieldset id="runBox">
    <legend>Scraping</legend>
    <label>Stato articoli</label>
    <input id="statusFilter" value="For Sale">
    <div class="row">
      <button id="startBtn" class="primary">Avvia</button>
      <button id="stopBtn" class="danger">Stop</button>
    </div>
    <div id="status"></div>
    <div class="bar"><div id="barFill"></div></div>
    <div id="errBox" class="err"></div>
  </fieldset>

  <p style="font-size:10px;color:#999;margin-top:10px;">
    Tieni aperta almeno una scheda su <b>discogs.com</b> dove sei loggato.
    Lo scraping continua in background mentre navighi.
  </p>

  <script src="popup.js"></script>
</body>
</html>
